name: CI & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi gir1.2-gtk-3.0 \
            gir1.2-webkit2-4.1 xvfb dbus

      - name: Smoke tests (save + restore)
        run: dbus-run-session -- xvfb-run -a sh tests/run.sh

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .deb
        run: ./build-deb.sh

      - name: Build .rpm (converted from .deb)
        run: |
          sudo apt-get update
          sudo apt-get install -y alien rpm
          cd dist
          sudo alien --to-rpm --scripts *.deb
          sudo chown "$USER" *.rpm
          rpm -qpi *.rpm

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            dist/*.deb
            dist/*.rpm

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install "pywebview>=5,<6" "pyinstaller>=6.10,<7"

      - name: Build portable exe
        run: >
          pyinstaller --noconsole --onefile --name DashboardShakhsi
          --icon assets/icon.ico
          --add-data "src/app.html;."
          --collect-all webview
          src/desktop.py

      - name: Rename artifact
        run: Move-Item dist/DashboardShakhsi.exe dist/DashboardShakhsi-windows.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/DashboardShakhsi-windows.exe

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install "pywebview>=5,<6" "pyinstaller>=6.10,<7"

      - name: Build .app
        run: >
          pyinstaller --windowed --name DashboardShakhsi
          --icon assets/icon.icns
          --add-data "src/app.html:."
          --collect-all webview
          src/desktop.py

      - name: Zip .app
        run: cd dist && zip -ry DashboardShakhsi-macos.zip DashboardShakhsi.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/DashboardShakhsi-macos.zip

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Prepare signing key
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
        run: |
          KS="$RUNNER_TEMP/release.keystore"
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$KS"
            echo "ANDROID_KS_PASS=$KS_PASS" >> "$GITHUB_ENV"
          else
            keytool -genkeypair -keystore "$KS" -alias dashboard \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android123 -keypass android123 \
              -dname "CN=dashboard-shakhsi"
            echo "ANDROID_KS_PASS=android123" >> "$GITHUB_ENV"
            echo "::warning::ANDROID_KEYSTORE_B64 secret not set - APK signed with a temporary key; updates will require uninstall."
          fi
          echo "ANDROID_KS_FILE=$KS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=dashboard" >> "$GITHUB_ENV"

      - name: Copy web app into assets
        run: |
          mkdir -p android/app/src/main/assets
          cp src/app.html android/app/src/main/assets/app.html

      - name: Build APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew --no-daemon assembleRelease

      - name: Collect artifact
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk \
            dist/DashboardShakhsi-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/DashboardShakhsi-android.apk

  release:
    needs: [build-linux, build-windows, build-macos, build-android]
    if: >
      always() && startsWith(github.ref, 'refs/tags/') &&
      needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" --generate-notes
